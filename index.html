<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Founder Stack</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Private founder operating system</p>
          <h1>Founder Stack</h1>
          <p class="hero-copy">
            A focused place for your CEO, COO, and CFO to push a daily update,
            track what changed, and keep one clean operating history.
          </p>
        </div>
        <div class="hero-chip">
          <span>Daily check-ins</span>
          <span>Append-only push history</span>
          <span>Team codes</span>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <template id="auth-template">
      <section class="panel auth-grid">
        <div class="auth-copy">
          <p class="section-label">How it works</p>
          <h2>Keep the founder room tight.</h2>
          <p>
            Sign in with your founder email and team code. The app checks your
            founder roster in Supabase, assigns your role automatically, and
            opens the shared workspace for your team.
          </p>
          <ul class="feature-list">
            <li>One founder team shares one live update room.</li>
            <li>Each push is timestamped and never overwritten.</li>
            <li>Role and access are assigned from your founder roster.</li>
          </ul>
        </div>

        <form id="auth-form" class="card form-card">
          <p class="section-label">Email sign-in</p>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="ceo@yourteam.com" required />
          </label>
          <label>
            <span>Team code</span>
            <input
              type="text"
              name="teamCode"
              placeholder="FOUNDERS-FORGE"
              minlength="4"
              required
            />
          </label>
          <button type="submit">Enter workspace</button>
          <div id="auth-feedback"></div>
          <p class="helper">
            Live mode: the app checks your founder email and team code against
            the private team roster.
          </p>
        </form>
      </section>
    </template>

    <template id="workspace-template">
      <section class="workspace">
        <section class="panel board-panel">
          <div class="board-head">
            <div>
              <p class="section-label">Weekly goals and tasks</p>
              <h2 id="team-name"></h2>
              <p id="week-label" class="prompt-summary"></p>
            </div>
            <div class="board-side">
              <div class="mini-meta-grid">
                <div>
                  <span class="meta-label">Signed in as</span>
                  <strong id="member-summary"></strong>
                </div>
                <div>
                  <span class="meta-label">Total pushes</span>
                  <strong id="push-count"></strong>
                </div>
                <div>
                  <span class="meta-label">Today</span>
                  <strong id="today-count"></strong>
                </div>
                <div>
                  <span class="meta-label">Founders seen</span>
                  <strong id="member-count"></strong>
                </div>
              </div>
              <button id="sign-out" class="ghost-button" type="button">Sign out</button>
            </div>
          </div>

          <div class="goal-panel">
            <div class="field-head">
              <span>Weekly goal</span>
              <button id="save-goal" class="ghost-button" type="button">Save weekly goal</button>
            </div>
            <textarea
              id="weekly-goal-input"
              rows="3"
              placeholder="Set the one goal the team should be driving this week."
            ></textarea>
          </div>

          <div class="tasks-grid">
            <section class="task-column">
              <div class="task-column-head">
                <div>
                  <p class="section-label">Owner</p>
                  <h3>Alex</h3>
                </div>
                <span class="task-pill">Tech Lane</span>
              </div>
              <div id="tasks-alex" class="task-list"></div>
              <form class="task-form" data-assignee="Alex">
                <input type="text" name="taskTitle" placeholder="Add a task for Alex" />
                <button type="submit">Add</button>
              </form>
            </section>

            <section class="task-column">
              <div class="task-column-head">
                <div>
                  <p class="section-label">Owner</p>
                  <h3>Ben</h3>
                </div>
                <span class="task-pill">Finance lane</span>
              </div>
              <div id="tasks-ben" class="task-list"></div>
              <form class="task-form" data-assignee="Ben">
                <input type="text" name="taskTitle" placeholder="Add a task for Ben" />
                <button type="submit">Add</button>
              </form>
            </section>

            <section class="task-column">
              <div class="task-column-head">
                <div>
                  <p class="section-label">Owner</p>
                  <h3>Zach</h3>
                </div>
                <span class="task-pill">Ops lane</span>
              </div>
              <div id="tasks-zach" class="task-list"></div>
              <form class="task-form" data-assignee="Zach">
                <input type="text" name="taskTitle" placeholder="Add a task for Zach" />
                <button type="submit">Add</button>
              </form>
            </section>
          </div>
        </section>

        <div class="capture-grid">
          <section class="panel capture-panel">
            <div class="composer-head">
              <div>
                <p class="section-label">Push an update</p>
                <h3 id="prompt-role-title">Daily founder note</h3>
                <p id="prompt-role-summary" class="prompt-summary"></p>
              </div>
              <span class="push-badge" id="next-push-id"></span>
            </div>

            <div class="prompt-card">
              <div class="prompt-head">
                <div>
                  <p class="section-label">AI Prompt</p>
                  <h4 id="prompt-label">Copy this into your AI</h4>
                </div>
                <button id="copy-prompt" class="ghost-button" type="button">Copy prompt</button>
              </div>
              <textarea id="prompt-script" class="prompt-script" rows="12" readonly></textarea>
            </div>

            <form id="update-form" class="stack-form">
              <div class="field-head">
                <span>Title</span>
                <button id="copy-title" class="ghost-button" type="button">Copy title</button>
              </div>
              <input
                type="text"
                name="headline"
                maxlength="80"
                placeholder="Paste the title from the AI response here."
                required
              />
              <label>
                <span>Paste AI-written update</span>
                <textarea
                  name="aiDraft"
                  rows="10"
                  placeholder="Paste the plain-text response from your AI here, including the title line."
                  required
                ></textarea>
              </label>
              <button type="submit">Push to stack</button>
            </form>
          </section>

          <section class="panel ideas-panel">
            <div class="history-head">
              <div>
                <p class="section-label">Idea board</p>
                <h3>Founder parking lot</h3>
              </div>
            </div>
            <form id="idea-form" class="stack-form">
              <label>
                <span>New idea</span>
                <textarea
                  name="ideaBody"
                  rows="5"
                  placeholder="Drop an idea, question, or opportunity here for the team to see."
                  required
                ></textarea>
              </label>
              <button type="submit">Add idea</button>
            </form>
            <div id="ideas-list" class="idea-list"></div>
          </section>
        </div>

        <section class="panel feed-shell">
          <div class="history-head">
            <div>
              <p class="section-label">Founder feed</p>
              <h3>Role-based update streams</h3>
            </div>
            <button id="export-json" class="ghost-button" type="button">Export JSON</button>
          </div>
          <div id="workspace-feedback"></div>
          <div class="feed-grid">
            <section class="feed-column">
              <div class="feed-column-head">
                <p class="section-label">CEO</p>
                <h3 id="ceo-owner">CEO stream</h3>
              </div>
              <div id="feed-ceo" class="feed-list"></div>
            </section>
            <section class="feed-column">
              <div class="feed-column-head">
                <p class="section-label">COO</p>
                <h3 id="coo-owner">COO stream</h3>
              </div>
              <div id="feed-coo" class="feed-list"></div>
            </section>
            <section class="feed-column">
              <div class="feed-column-head">
                <p class="section-label">CFO</p>
                <h3 id="cfo-owner">CFO stream</h3>
              </div>
              <div id="feed-cfo" class="feed-list"></div>
            </section>
          </div>
        </section>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
