<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Founder Stack</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Private founder operating system</p>
          <h1>Founder Stack</h1>
          <p class="hero-copy">
            A focused place for your CEO, COO, and CFO to push a daily update,
            track what changed, and keep one clean operating history.
          </p>
        </div>
        <div class="hero-chip">
          <span>Daily check-ins</span>
          <span>Append-only push history</span>
          <span>Team codes</span>
        </div>
      </header>

      <main id="app"></main>
    </div>

    <template id="auth-template">
      <section class="panel auth-grid">
        <div class="auth-copy">
          <p class="section-label">How it works</p>
          <h2>Keep the founder room tight.</h2>
          <p>
            Sign in with your founder email and team code. The app checks your
            founder roster in Supabase, assigns your role automatically, and
            opens the shared workspace for your team.
          </p>
          <ul class="feature-list">
            <li>One founder team shares one live update room.</li>
            <li>Each push is timestamped and never overwritten.</li>
            <li>Role and access are assigned from your founder roster.</li>
          </ul>
        </div>

        <form id="auth-form" class="card form-card">
          <p class="section-label">Email sign-in</p>
          <label>
            <span>Email</span>
            <input type="email" name="email" placeholder="ceo@yourteam.com" required />
          </label>
          <label>
            <span>Team code</span>
            <input
              type="text"
              name="teamCode"
              placeholder="FOUNDERS-FORGE"
              minlength="4"
              required
            />
          </label>
          <button type="submit">Enter workspace</button>
          <div id="auth-feedback"></div>
          <p class="helper">
            Live mode: the app checks your founder email and team code against
            the private team roster.
          </p>
        </form>
      </section>
    </template>

    <template id="workspace-template">
      <section class="workspace">
        <div class="workspace-top">
          <div class="team-card panel">
            <div class="team-meta">
              <p class="section-label">Team room</p>
              <h2 id="team-name"></h2>
            </div>
            <div class="team-inline">
              <div>
                <span class="meta-label">Access model</span>
                <strong>Invite-only founder roster</strong>
              </div>
              <div>
                <span class="meta-label">Signed in as</span>
                <strong id="member-summary"></strong>
              </div>
            </div>
            <div class="team-actions">
              <button id="sign-out" class="ghost-button" type="button">Sign out</button>
            </div>
          </div>

          <div class="panel digest-panel">
            <p class="section-label">Today at a glance</p>
            <div class="digest-grid">
              <div>
                <span class="metric" id="push-count">0</span>
                <span class="metric-label">Total pushes</span>
              </div>
              <div>
                <span class="metric" id="today-count">0</span>
                <span class="metric-label">Today</span>
              </div>
              <div>
                <span class="metric" id="member-count">0</span>
                <span class="metric-label">Members seen</span>
              </div>
            </div>
          </div>
        </div>

        <div class="workspace-grid">
          <section class="panel">
            <div class="composer-head">
              <div>
                <p class="section-label">Push an update</p>
                <h3 id="prompt-role-title">Daily founder note</h3>
                <p id="prompt-role-summary" class="prompt-summary"></p>
              </div>
              <span class="push-badge" id="next-push-id"></span>
            </div>

            <div class="prompt-card">
              <div class="prompt-head">
                <div>
                  <p class="section-label">AI Prompt</p>
                  <h4 id="prompt-label">Copy this into your AI</h4>
                </div>
                <button id="copy-prompt" class="ghost-button" type="button">Copy prompt</button>
              </div>
              <textarea id="prompt-script" class="prompt-script" rows="14" readonly></textarea>
            </div>

            <form id="update-form" class="stack-form">
              <div class="field-head">
                <span>Title</span>
                <button id="copy-title" class="ghost-button" type="button">Copy title</button>
              </div>
              <input
                type="text"
                name="headline"
                maxlength="80"
                placeholder="Paste the title from the AI response here."
                required
              />
              <label>
                <span>Paste AI-written update</span>
                <textarea
                  name="aiDraft"
                  rows="12"
                  placeholder="Paste the plain-text response from your AI here, including the title line."
                  required
                ></textarea>
              </label>
              <button type="submit">Push to stack</button>
            </form>
          </section>

          <section class="panel">
            <div class="history-head">
              <div>
                <p class="section-label">History</p>
                <h3>Update stack</h3>
              </div>
              <button id="export-json" class="ghost-button" type="button">Export JSON</button>
            </div>
            <div id="workspace-feedback"></div>
            <div id="history-list" class="history-list"></div>
          </section>
        </div>
      </section>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
